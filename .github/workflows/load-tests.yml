name: Load Testing

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario to execute"
        required: true
        type: choice
        default: sustained
        options:
          - sustained
          - spike
          - stress
          - soak
          - all
      enforce_thresholds:
        description: "Fail workflow if thresholds are violated"
        required: true
        type: boolean
        default: true

jobs:
  run-k6:
    name: Run k6 scenario
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.LOAD_TEST_BASE_URL }}
      LOAD_TEST_API_KEY: ${{ secrets.LOAD_TEST_API_KEY }}
      TEST_WALLET_ADDRESS: ${{ secrets.LOAD_TEST_WALLET_ADDRESS }}
      TEST_TX_ID: ${{ secrets.LOAD_TEST_TX_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run selected load test scenario
        env:
          K6_NO_THRESHOLDS: ${{ inputs.enforce_thresholds == true && 'false' || 'true' }}
        run: |
          if [ "${{ inputs.scenario }}" = "all" ]; then
            ./load-tests/run-all.sh
          else
            ./load-tests/run.sh "${{ inputs.scenario }}"
          fi

      - name: Upload load test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: load-test-${{ inputs.scenario }}-${{ github.run_number }}
          path: load-tests/results/runs/**
          if-no-files-found: error
